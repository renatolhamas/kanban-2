decision_notes: |
  **FINAL VERDICT: FAIL (BLOCKING)**

  Story 1.2 has a critical security flaw that breaks core functionality:
  **Users cannot login after closing the browser or clearing cookies.**

  This is a RLS policy bypass in the login endpoint. The endpoint uses an anonKey
  client WITHOUT the user's JWT in the Authorization header, causing RLS to block
  the query (auth.jwt() = NULL). The fix is well-documented in the attached fix request
  and requires extracting the accessToken from signInWithPassword() and passing it in
  the Authorization header.

  **WHY THIS WASN'T CAUGHT EARLIER:**
  - Unit tests are contracts, not actual RLS enforcement tests
  - Manual testing only covered 'register → immediate login' (JWT in cookie)
  - Did NOT test 'logout → clear cookies → login' scenario
  - RLS policy review assumed login endpoint was using correct pattern

  **SEVERITY: CRITICAL - BLOCKS PRODUCTION DEPLOYMENT**

  **ACTION: Apply fix from QA-FIX_REQUEST and re-test with verification checklist**

