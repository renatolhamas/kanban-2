root_cause_analysis:
  problem: "RLS policy bypass in login endpoint"
  why_missed: |
    1. Unit tests use contracts/mocks, NOT actual RLS policies
    2. Manual testing did NOT include 'login after session clear' scenario
    3. Testing only covered 'happy path' (immediate post-register login)
    4. RLS policy enforcement not explicitly tested
    5. JWT payload included tenant_id, but never validated that Authorization header was set

  correct_pattern: |
    1. After signInWithPassword(), extract accessToken from session
    2. Create NEW Supabase client with Authorization: Bearer {accessToken}
    3. Query users table with this client (NOT the anonKey client)
    4. RLS policy then evaluates auth.jwt()['tenant_id'] correctly
    5. Query succeeds, user can login

