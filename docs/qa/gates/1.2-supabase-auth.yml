top_issues:
  - id: 'BUILD-001'
    severity: high
    finding: 'TypeScript compilation error in lib/auth.ts:37 - Type mismatch in JWT verification return. jose library JWTPayload type incompatible with custom JWTPayload interface.'
    suggested_action: 'Fix type casting: Change `return verified.payload as JWTPayload` to `return verified.payload as unknown as JWTPayload` to properly cast from jose generic type to custom type.'
    impact: 'Build fails (npm run build exits with code 1) - cannot proceed to production'
    reference: 'Error: Type ''JWTPayload'' is missing tenant_id, email, role properties'

  - id: 'SEC-001'
    severity: medium
    finding: 'JWT Secret default value in production. lib/auth.ts:7-9 contains default-dev-secret that will be used if JWT_SECRET env var not set.'
    suggested_action: 'Ensure JWT_SECRET environment variable is ALWAYS set in production. Consider throwing error if env var missing in production mode (NODE_ENV=production).'
    impact: 'If ENV var not configured, default secret exposes JWT tokens to compromise'

  - id: 'TEST-001'
    severity: medium
    finding: 'Register and login endpoint tests are placeholders only. app/api/auth/register/register.test.ts and login/login.test.ts files exist but contain no actual test implementations (marked as placeholders in story notes).'
    suggested_action: 'Add comprehensive integration tests for register/login endpoints: test happy path, validation errors, duplicate email handling, tenant creation, JWT payload structure, cookie flags.'
    impact: 'No integration test coverage for critical auth flows - gaps in validation, error handling, and tenant isolation testing'

  - id: 'REL-001'
    severity: low
    finding: 'Profile endpoint GET assumes user exists in database after JWT validation. No explicit check that user.row exists before using user fields.'
    suggested_action: 'Current error handling is adequate (returns 404 if user not found) but consider log-and-alert for orphaned JWT scenarios.'
    impact: 'Low - error handling is present, but suspicious state could indicate JWT/DB consistency issues'

