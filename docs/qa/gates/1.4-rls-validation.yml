architecture_decisions:
  - decision: 'Separated performance tests into rls-performance.test.ts'
    rationale: 'Isolated performance suite prevents race conditions in CI/CD. Marked with .skip to avoid interfering with validation tests.'

  - decision: 'Used Vitest with real Supabase connection instead of mocks'
    rationale: 'RLS is database-enforced policy layer. Mocks cannot validate actual policy enforcement. Integration tests required.'

  - decision: 'Added concurrency group to GitHub Actions'
    rationale: 'Prevents parallel job execution which was causing test data corruption due to Supabase replication lag.'

  - decision: 'Reduced Node.js matrix to single version (20.x)'
    rationale: 'Node version variance was not a concern. Single version simplifies testing matrix and eliminates parallel race conditions.'

