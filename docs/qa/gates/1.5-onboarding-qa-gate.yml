## 📝 ACTION ITEMS FOR @DEV

### Phase 4 (Implementation) — PRIORITY: HIGH

**Task 6:** Create application-layer kanban helper
- [ ] Create `lib/kanban.ts` with `createDefaultKanban(supabase, tenantId)`
- [ ] Function creates 1 kanban: name="Main", is_main=true, order_position=1
- [ ] Function creates 4 columns in transaction:
  - Novo (order_position=1)
  - Qualificado (order_position=2)
  - Em Negociação (order_position=3)
  - Fechado (order_position=4)
- [ ] Atomic transaction (all-or-nothing)
- [ ] Error handling: non-blocking (user/tenant kept alive if kanban fails)

**Task 6.2:** Integrate into register flow
- [ ] Add STEP 5.5 to `app/api/auth/register/route.ts`
- [ ] Call `createDefaultKanban()` after user creation (STEP 5)
- [ ] Log errors but continue (non-blocking)

### Phase 6 (Testing) — PRIORITY: HIGH

**Task 11:** Create integration tests
- [ ] Test 1: Register new user → verify kanban created in database
- [ ] Test 2: Register new user → verify exactly 4 columns created with correct names
- [ ] Test 3: Concurrent register (same email) → both users have separate kanbans
- [ ] Test 4: Kanban creation failure → user/tenant NOT deleted (non-blocking)

