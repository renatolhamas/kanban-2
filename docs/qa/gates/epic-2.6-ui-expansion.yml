    title: "Badge.test.tsx - Missing Required Prop"
    description: |
      Line 193: <Badge></Badge> renders without required 'children' prop
      BadgeProps defines children as required (React.ReactNode)
      TypeScript correctly flags this as violation
    recommendation: "Provide children content in test or make prop optional"
    fix_request: "QA-FIX_REQUEST-2026-04-11_story-2.6.md"

  - id: "TS-003"
    severity: HIGH
    category: "type-system"
    title: "Modal.tsx - Interface Type Mismatch"
    description: |
      Line 4: ModalProps extends HTMLAttributes<HTMLDivElement>
      But defines 'title?: React.ReactNode' which conflicts with HTMLAttributes.title (string)
      TypeScript error: "Type 'ReactNode' not assignable to type 'string'"
    recommendation: "Use Omit<> to exclude 'title' from HTMLAttributes, or rename property"
    fix_request: "QA-FIX_REQUEST-2026-04-11_story-2.6.md"

